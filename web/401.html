<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>401 Unauthorized</title>
  <link rel="stylesheet" href="/style.css" />
  <script defer src="/theme.js"></script>
  <style>
    :root {
      --unauthorized-card-bg: color-mix(in srgb, var(--paper-2) 88%, transparent);
      --unauthorized-code-bg: color-mix(in srgb, var(--paper-3) 70%, transparent);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      width: min(520px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 18px;
      background: var(--unauthorized-card-bg);
      border: 1px solid var(--line);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    code {
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--unauthorized-code-bg);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>401 Unauthorized</h1>
    <p>__MESSAGE__. Open this page with a valid <code>?key=...</code> query parameter.</p>
  </main>
</body>
</html>
