root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/inti ."
entrypoint = ["./tmp/inti"]
args_bin = ["serve"]
include_ext = ["go", "html", "css", "js", "json", "svg"]
include_dir = ["cmd", "internal", "web"]
include_file = ["main.go", "embed.go"]
exclude_dir = ["tmp", ".tmp", "dist", "build", "node_modules", "extension", "web-src", ".git",]
exclude_unchanged = true
delay = 200
