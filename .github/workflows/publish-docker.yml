name: Publish Docker Image on Tag

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "tag=${TAG}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build -t 100nandoo/inti:${{ env.tag }} .
          docker tag 100nandoo/inti:${{ env.tag }} 100nandoo/inti:latest

      - name: Push Docker image with tag
        run: |
          docker push 100nandoo/inti:${{ env.tag }}
          docker push 100nandoo/inti:latest
