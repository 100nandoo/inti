version: "3.8"

services:
  inti:
    image: 100nandoo/inti:latest
    container_name: inti
    network_mode: host
    restart: unless-stopped
    ports:
      - "8282:8282"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - INTI_CONFIG_DIR=/app/config
      - HOST=0.0.0.0
    env_file:
      - path: .env
        required: false
    volumes:
      - ./config:/app/config
      - ./.env:/app/.env
      # Optional: mount web directory for development
      # - ./web:/app/web
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8282/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
